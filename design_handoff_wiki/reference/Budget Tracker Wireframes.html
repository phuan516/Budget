<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki / Docs — Wireframe Reference</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f0eee9; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="wireframes/shared.jsx"></script>
  <script type="text/babel" src="wireframes/docs.jsx"></script>

  <script type="text/babel" data-presets="react">
    const D_W = 1200, D_H = 800;
    const M_W = 375, M_H = 760;

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="wiki" title="Wiki · Help & docs" subtitle="Three-pane help article · desktop + mobile · same Ledger system">
            <DCArtboard id="desktop" label="Desktop · article · 1200×800" width={D_W} height={D_H}><WikiA /></DCArtboard>
            <DCArtboard id="mobile-index" label="Mobile · index · 375×760" width={M_W} height={M_H}><WikiMobileIndex /></DCArtboard>
            <DCArtboard id="mobile-article" label="Mobile · article · 375×760" width={M_W} height={M_H}><WikiMobileArticle /></DCArtboard>
          </DCSection>

          <DCPostIt top={-20} left={60} rotate={-3} width={220}>
            Canonical wiki / docs design. Click an artboard ⤢ to focus. See README.md for the full spec.
          </DCPostIt>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
